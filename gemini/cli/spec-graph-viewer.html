<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDD Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0b0b12;
    --bg-elevated: rgba(16, 16, 26, 0.82);
    --bg-panel: rgba(14, 14, 22, 0.78);
    --border-subtle: rgba(255, 255, 255, 0.07);
    --border-hover: rgba(255, 255, 255, 0.14);
    --text-primary: #e8e8ec;
    --text-secondary: #a0a0b0;
    --text-muted: #606070;
    --accent-orange: #ff922b;
    --accent-pink: #e64980;
    --accent-purple: #cc5de8;
    --accent-red: #ff6b6b;
    --accent-green: #51cf66;
    --accent-blue: #4a9eff;
    --font-sans: 'Sora', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --blur: blur(24px);
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── SVG Canvas ──────────────────────────────────────────────────────────── */
  svg { width: 100%; height: 100%; display: block; }

  .edge-line {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.2;
    fill: none;
    transition: stroke 0.25s, stroke-opacity 0.25s;
  }
  .edge-line.dimmed { stroke-opacity: 0.04; }
  .edge-line.highlighted { stroke: var(--accent-orange); stroke-width: 2; stroke-opacity: 0.9; }
  .edge-line.impact { stroke: var(--accent-red); stroke-width: 2.5; stroke-opacity: 1; }

  .edge-label {
    font-family: var(--font-mono);
    font-size: 9px;
    fill: var(--text-muted);
    pointer-events: none;
    transition: fill-opacity 0.25s;
  }
  .edge-label.dimmed { fill-opacity: 0.04; }
  .edge-label.highlighted { fill: var(--accent-orange); fill-opacity: 1; }
  .edge-label.impact { fill: var(--accent-red); fill-opacity: 1; }

  .node-circle {
    stroke: var(--bg-primary);
    stroke-width: 2;
    cursor: pointer;
    transition: opacity 0.25s, stroke 0.25s, r 0.15s;
  }
  .node-circle.dimmed { opacity: 0.06; }
  .node-circle.highlighted { stroke: rgba(255,255,255,0.7); stroke-width: 2.5; }
  .node-circle.impact { stroke: var(--accent-red); stroke-width: 3; }
  .node-circle.selected { stroke: #fff; stroke-width: 3.5; filter: url(#glow); }

  .node-label {
    font-family: var(--font-mono);
    font-size: 10px;
    fill: var(--text-secondary);
    pointer-events: none;
    text-anchor: middle;
    transition: fill-opacity 0.25s;
  }
  .node-label.dimmed { fill-opacity: 0.04; }
  .node-label.highlighted { fill: #fff; fill-opacity: 1; }
  .node-label.impact { fill: var(--accent-red); fill-opacity: 1; }
  .node-label.selected { fill: #fff; fill-opacity: 1; font-weight: 600; }

  marker path { fill: rgba(255,255,255,0.2); }

  /* ── Panels (glassmorphism) ──────────────────────────────────────────────── */
  .panel {
    position: fixed;
    background: var(--bg-panel);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 16px;
    z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .panel h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Search / Filter Bar ─────────────────────────────────────────────────── */
  .filter-bar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    align-items: center;
    z-index: 20;
    background: var(--bg-elevated);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 6px 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  .filter-bar input,
  .filter-bar select {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .filter-bar input:focus,
  .filter-bar select:focus {
    border-color: var(--accent-orange);
    background: rgba(255, 146, 43, 0.06);
  }
  .filter-bar input { width: 200px; }
  .filter-bar select { min-width: 100px; }
  .filter-bar select option { background: #1a1a28; color: var(--text-primary); }

  /* ── Axis Toggle Buttons ───────────────────────────────────────────────── */
  .axis-toggle-group {
    display: flex;
    gap: 2px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: var(--radius-sm);
    padding: 2px;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .axis-toggle {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .axis-toggle:hover {
    color: var(--text-secondary);
    background: rgba(255, 255, 255, 0.05);
  }
  .axis-toggle.active[data-axis="knowledge"] {
    color: #4a9eff;
    background: rgba(74, 158, 255, 0.12);
    box-shadow: inset 0 0 0 1px rgba(74, 158, 255, 0.3);
  }
  .axis-toggle.active[data-axis="work"] {
    color: #ff6b6b;
    background: rgba(255, 107, 107, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 107, 107, 0.3);
  }
  .axis-toggle.active[data-axis="governance"] {
    color: #20c997;
    background: rgba(32, 201, 151, 0.12);
    box-shadow: inset 0 0 0 1px rgba(32, 201, 151, 0.3);
  }

  /* ── Legend Panel ─────────────────────────────────────────────────────────── */
  #legend { top: 70px; left: 16px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Stats Panel ─────────────────────────────────────────────────────────── */
  #stats { bottom: 16px; left: 16px; min-width: 180px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 3px;
  }
  .stat-row .label { color: var(--text-muted); }
  .stat-row .value {
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--text-secondary);
  }
  .stat-divider {
    border-top: 1px solid var(--border-subtle);
    margin: 8px 0;
  }

  /* ── Detail Panel (right slide-in) ───────────────────────────────────────── */
  #detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 340px;
    height: 100vh;
    background: rgba(12, 12, 20, 0.88);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-left: 1px solid var(--border-subtle);
    z-index: 30;
    padding: 24px 20px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 32px rgba(0,0,0,0.3);
  }
  #detail-panel.open { transform: translateX(0); }

  #detail-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    transition: background 0.2s, color 0.2s;
  }
  #detail-panel .close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  #detail-panel .spec-id {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #detail-panel .spec-title {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .detail-field { margin-bottom: 10px; }
  .detail-field .field-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .detail-field .field-value {
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
    word-break: break-all;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-secondary);
  }
  .layer-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
  }
  .status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .status-badge.active { background: rgba(81, 207, 102, 0.15); color: #51cf66; }
  .status-badge.draft { background: rgba(134, 142, 150, 0.15); color: #868e96; }
  .status-badge.deprecated { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
  .status-badge.completed { background: rgba(74, 158, 255, 0.15); color: #4a9eff; }
  .status-badge.archived { background: rgba(134, 142, 150, 0.1); color: #555; }
  .status-badge.discussion { background: rgba(32, 201, 151, 0.15); color: #20c997; }
  .status-badge.accepted { background: rgba(81, 207, 102, 0.15); color: #51cf66; }
  .status-badge.rejected { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
  .status-badge.proposed { background: rgba(255, 210, 67, 0.15); color: #ffd243; }
  .status-badge.superseded { background: rgba(204, 93, 232, 0.15); color: #cc5de8; }
  .status-badge.withdrawn { background: rgba(134, 142, 150, 0.1); color: #555; }

  .detail-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 16px 0 8px;
    border-top: 1px solid var(--border-subtle);
    padding-top: 12px;
  }
  .dep-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 4px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .dep-item:hover { background: rgba(255,146,43,0.08); color: var(--accent-orange); }
  .dep-item .dep-relation {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ── Impact mode badge ───────────────────────────────────────────────────── */
  #impact-badge {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 107, 107, 0.12);
    border: 1px solid rgba(255, 107, 107, 0.25);
    color: var(--accent-red);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 8px;
    z-index: 20;
    display: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #impact-badge.visible { display: block; }

  /* ── Tooltip ─────────────────────────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    background: rgba(14, 14, 22, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
    pointer-events: none;
    z-index: 40;
    display: none;
    white-space: nowrap;
    max-width: 420px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #tooltip .tip-id { color: #fff; font-weight: 600; }
  #tooltip .tip-title { color: var(--text-secondary); font-weight: 400; margin-left: 6px; }
  #tooltip .tip-meta { color: var(--text-muted); font-size: 10px; display: block; margin-top: 3px; }

  /* ── View Tabs ──────────────────────────────────────────────────────────── */
  #view-tabs {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 0;
    z-index: 20;
    background: var(--bg-elevated);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .view-tab {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .view-tab:hover { color: var(--text-secondary); }
  .view-tab.active {
    color: var(--accent-orange);
    background: rgba(255, 146, 43, 0.08);
  }

  /* ── Timeline View ─────────────────────────────────────────────────────── */
  #timeline-container {
    display: none;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 80px 0 0 0;
    position: relative;
  }
  #timeline-container.visible { display: flex; flex-direction: column; }

  #timeline-legend {
    position: absolute;
    top: 72px;
    right: 16px;
    z-index: 10;
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 6px 14px;
    background: rgba(12, 12, 20, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  #timeline-legend .legend-item { display: flex; align-items: center; gap: 4px; }
  #timeline-legend .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  #timeline-scroll-area {
    flex: 1;
    overflow-x: auto;
    overflow-y: auto;
    position: relative;
    padding: 0 24px 24px 0;
  }

  #timeline-labels {
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--bg-primary);
    min-width: 220px;
    width: 220px;
    flex-shrink: 0;
    pointer-events: auto;
  }

  .timeline-wrapper {
    display: flex;
    min-width: 100%;
    min-height: 100%;
  }

  #timeline-chart { flex: 1; min-width: 0; }
  .timeline-svg { display: block; }

  .swimlane-bg { rx: 6; }

  .tl-label-row {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: default;
  }
  .tl-label-id {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .tl-label-title {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 188px;
  }
  .tl-phase-badge {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 4px;
    margin-top: 4px;
  }
  .tl-progress {
    margin-top: 4px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .tl-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .timeline-bar {
    rx: 4;
    cursor: pointer;
    transition: opacity 0.2s, stroke 0.2s;
  }
  .timeline-bar:hover { stroke: #fff; stroke-width: 2; }
  .timeline-bar.tl-selected { stroke: var(--accent-orange); stroke-width: 2.5; }

  .timeline-bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    fill: #fff;
    pointer-events: none;
  }
  .timeline-axis text {
    font-family: var(--font-mono);
    font-size: 10px;
    fill: var(--text-muted);
  }
  .timeline-axis line, .timeline-axis path { stroke: rgba(255,255,255,0.12); }
  .timeline-grid line { stroke: rgba(255, 255, 255, 0.04); }
  .timeline-empty {
    font-family: var(--font-sans);
    font-size: 14px;
    fill: var(--text-muted);
    text-anchor: middle;
  }
  .activation-marker { cursor: pointer; transition: opacity 0.2s; }
  .activation-marker:hover { opacity: 1 !important; }
  .activation-marker-line { stroke-dasharray: 2 3; pointer-events: none; }
  .activation-marker-label {
    font-family: var(--font-mono);
    font-size: 8px;
    pointer-events: none;
    text-anchor: middle;
  }
  .today-line {
    stroke: var(--accent-red);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: 0.7;
  }
  .today-label {
    font-family: var(--font-mono);
    font-size: 9px;
    fill: var(--accent-red);
  }
  .connector-line {
    stroke: rgba(255,255,255,0.06);
    stroke-width: 1;
  }
  .dep-arrow {
    stroke: rgba(255, 146, 43, 0.35);
    stroke-width: 1.2;
    stroke-dasharray: 4 3;
    fill: none;
    marker-end: url(#dep-arrowhead);
  }

  /* ── Timeline Detail Panel ──────────────────────────────────────────────── */
  #timeline-detail {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0;
    max-height: 260px;
    background: rgba(12, 12, 20, 0.9);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-top: 1px solid var(--border-subtle);
    z-index: 20;
    overflow-y: auto;
    transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
  }
  #timeline-detail.open { height: 240px; padding: 20px 24px; }
  #timeline-detail .td-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  #timeline-detail .td-id {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #timeline-detail .td-title {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  #timeline-detail .td-close {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 8px;
    line-height: 1;
    transition: background 0.2s, color 0.2s;
  }
  #timeline-detail .td-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  #timeline-detail .td-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  #timeline-detail .td-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    font-size: 12px;
  }
  #timeline-detail .td-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  #timeline-detail .td-meta-item {
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  #timeline-detail .td-meta-item span { color: var(--text-muted); }

  /* ── Scrollbar ───────────────────────────────────────────────────────────── */

</style>
</head>

    </div>

    <div id="timeline-detail-content"></div>
  </div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const graphData = "__GRAPH_DATA__";

const LAYER_COLORS = {
  architecture: '#4a9eff',
  domain: '#51cf66',
  product: '#ffd43b',
  feature: '#ff922b',
  documentation: '#cc5de8',
  'work-spec': '#ff6b6b',
  'work-plan': '#e599f7',
  'work-task': '#ffa8a8',
};
const GOVERNANCE_COLORS = {
  rfc: '#20c997',
  adr: '#339af0',
  rule: '#f06595',
};
const DEFAULT_COLOR = '#868e96';

const STATUS_COLORS = {
  draft: '#868e96',
  active: '#339af0',
  completed: '#51cf66',
  archived: '#555',
};

function layerColor(nodeOrLayer) {
  if (typeof nodeOrLayer === 'string') {
    return LAYER_COLORS[nodeOrLayer] || GOVERNANCE_COLORS[nodeOrLayer] || DEFAULT_COLOR;
  }
  return LAYER_COLORS[nodeOrLayer.layer] || GOVERNANCE_COLORS[nodeOrLayer.type] || DEFAULT_COLOR;
}

function classifyAxis(node) {
  const govTypes = new Set(['rfc', 'adr', 'rule']);
  const workLayers = new Set(['work-spec', 'work-plan', 'work-task']);
  const knowLayers = new Set(['architecture', 'domain', 'product', 'feature', 'documentation']);
  if (govTypes.has(node.type)) return 'governance';
  if (workLayers.has(node.layer)) return 'work';
  if (knowLayers.has(node.layer)) return 'knowledge';
  return 'unknown';
}

// ── Pre-process ─────────────────────────────────────────────────────────────
const nodeMap = new Map();
graphData.nodes.forEach(n => {
  n._inDeg = 0;
  n._outDeg = 0;
  nodeMap.set(n.id, n);
});

const edges = graphData.edges.map(e => ({
  source: e.source,
  target: e.target,
  relation: e.relation,
}));

edges.forEach(e => {
  const s = nodeMap.get(e.source);
  const t = nodeMap.get(e.target);
  if (s) s._outDeg = (s._outDeg || 0) + 1;
  if (t) t._inDeg = (t._inDeg || 0) + 1;
});

graphData.nodes.forEach(n => {
  n._deg = (n._inDeg || 0) + (n._outDeg || 0);
});

// Build adjacency
const reverseAdj = new Map();
edges.forEach(e => {
  if (!reverseAdj.has(e.target)) reverseAdj.set(e.target, []);
  reverseAdj.get(e.target).push(e);
});

const forwardAdj = new Map();
edges.forEach(e => {
  if (!forwardAdj.has(e.source)) forwardAdj.set(e.source, []);
  forwardAdj.get(e.source).push(e);
});

// ── State ───────────────────────────────────────────────────────────────────
let selectedNodeId = null;
let impactMode = false;
let impactSet = new Set();

// ── SVG Setup ───────────────────────────────────────────────────────────────
const svg = d3.select('#graph-svg');
const width = window.innerWidth;
const height = window.innerHeight;

// Glow filter
const defs = svg.append('defs');
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
const merge = filter.append('feMerge');
merge.append('feMergeNode').attr('in', 'blur');
merge.append('feMergeNode').attr('in', 'SourceGraphic');

// Arrow marker
defs.append('marker')
  .attr('id', 'arrowhead')
  .attr('viewBox', '0 -5 10 10')
  .attr('refX', 20)
  .attr('refY', 0)
  .attr('markerWidth', 6)
  .attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M0,-4L8,0L0,4')
  .attr('fill', 'rgba(255,255,255,0.2)');

// Zoom container
const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.1, 5])
  .on('zoom', (event) => {
    g.attr('transform', event.transform);
  });

svg.call(zoom);

// Click background to deselect
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.tagName === 'svg') {
    deselectAll();
  }
});

// ── Simulation ──────────────────────────────────────────────────────────────
const simNodes = graphData.nodes.map(n => ({ ...n }));
const simEdges = edges.map(e => ({ ...e }));

const simulation = d3.forceSimulation(simNodes)
  .force('link', d3.forceLink(simEdges).id(d => d.id).distance(120))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 8))
  .alphaDecay(0.02);

function nodeRadius(d) {
  return Math.max(6, Math.min(20, 6 + (d._deg || 0) * 2));
}

// ── Draw edges ──────────────────────────────────────────────────────────────
const edgeGroup = g.append('g').attr('class', 'edges');

const edgeLines = edgeGroup.selectAll('line')
  .data(simEdges)
  .join('line')
  .attr('class', 'edge-line')
  .attr('marker-end', 'url(#arrowhead)')
  .on('mouseenter', (event, d) => {
    const tip = document.getElementById('tooltip');
    tip.textContent = d.relation;
    tip.style.display = 'block';
    tip.style.left = event.clientX + 12 + 'px';
    tip.style.top = event.clientY - 8 + 'px';
  })
  .on('mousemove', (event) => {
    const tip = document.getElementById('tooltip');
    tip.style.left = event.clientX + 12 + 'px';
    tip.style.top = event.clientY - 8 + 'px';
  })
  .on('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

const edgeLabels = edgeGroup.selectAll('text')
  .data(simEdges)
  .join('text')
  .attr('class', 'edge-label')
  .text(d => d.relation);

// ── Draw nodes ──────────────────────────────────────────────────────────────
const nodeGroup = g.append('g').attr('class', 'nodes');

const nodeCircles = nodeGroup.selectAll('circle')
  .data(simNodes)
  .join('circle')
  .attr('class', 'node-circle')
  .attr('r', d => nodeRadius(d))
  .attr('fill', d => layerColor(d))
  .on('click', (event, d) => {
    event.stopPropagation();
    selectNode(d.id);
  })
  .on('mouseenter', (event, d) => {
    const tip = document.getElementById('tooltip');
    tip.innerHTML = `<span class="tip-id">${d.id}</span>${d.title ? `<span class="tip-title">${d.title}</span>` : ''}`;
    tip.style.display = 'block';
    tip.style.left = event.clientX + 12 + 'px';
    tip.style.top = event.clientY - 8 + 'px';
  })
  .on('mousemove', (event) => {
    const tip = document.getElementById('tooltip');
    tip.style.left = event.clientX + 12 + 'px';
    tip.style.top = event.clientY - 8 + 'px';
  })
  .on('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
  })
  .call(d3.drag()
    .on('start', dragStarted)
    .on('drag', dragged)
    .on('end', dragEnded));

const nodeLabels = nodeGroup.selectAll('text')
  .data(simNodes)
  .join('text')
  .attr('class', 'node-label')
  .attr('dy', d => nodeRadius(d) + 14)
  .text(d => d.id);

// ── Simulation tick ─────────────────────────────────────────────────────────
simulation.on('tick', () => {
  edgeLines
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  edgeLabels
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2 - 4);

  nodeCircles
    .attr('cx', d => d.x)
    .attr('cy', d => d.y);

  nodeLabels
    .attr('x', d => d.x)
    .attr('y', d => d.y);
});

// ── Drag handlers ───────────────────────────────────────────────────────────
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ── Selection & Highlighting ────────────────────────────────────────────────
function selectNode(id) {
  selectedNodeId = id;
  impactMode = false;
  document.getElementById('impact-badge').classList.remove('visible');

  const neighbors = new Set([id]);
  const neighborEdges = new Set();

  simEdges.forEach((e, i) => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === id || tid === id) {
      neighbors.add(sid);
      neighbors.add(tid);
      neighborEdges.add(i);
    }
  });

  nodeCircles.each(function(d) {
    const el = d3.select(this);
    el.classed('dimmed', !neighbors.has(d.id));
    el.classed('highlighted', neighbors.has(d.id) && d.id !== id);
    el.classed('selected', d.id === id);
    el.classed('impact', false);
  });

  nodeLabels.each(function(d) {
    const el = d3.select(this);
    el.classed('dimmed', !neighbors.has(d.id));
    el.classed('highlighted', neighbors.has(d.id) && d.id !== id);
    el.classed('selected', d.id === id);
    el.classed('impact', false);
  });

  edgeLines.each(function(_, i) {
    const el = d3.select(this);
    el.classed('dimmed', !neighborEdges.has(i));
    el.classed('highlighted', neighborEdges.has(i));
    el.classed('impact', false);
  });

  edgeLabels.each(function(_, i) {
    const el = d3.select(this);
    el.classed('dimmed', !neighborEdges.has(i));
    el.classed('highlighted', neighborEdges.has(i));
    el.classed('impact', false);
  });

  showDetailPanel(id);
}

function deselectAll() {
  selectedNodeId = null;
  impactMode = false;
  document.getElementById('impact-badge').classList.remove('visible');
  impactSet.clear();

  nodeCircles.classed('dimmed highlighted selected impact', false);
  nodeLabels.classed('dimmed highlighted selected impact', false);
  edgeLines.classed('dimmed highlighted impact', false);
  edgeLabels.classed('dimmed highlighted impact', false);

  hideDetailPanel();
  applyFilters();
}

// ── Impact Mode (BFS over reverse edges) ────────────────────────────────────
function enterImpactMode(startId) {
  impactMode = true;
  document.getElementById('impact-badge').classList.add('visible');

  impactSet = new Set();
  const queue = [startId];
  impactSet.add(startId);

  while (queue.length > 0) {
    const current = queue.shift();
    const incoming = reverseAdj.get(current) || [];
    for (const edge of incoming) {
      const src = typeof edge.source === 'object' ? edge.source : edge.source;
      if (!impactSet.has(src)) {
        impactSet.add(src);
        queue.push(src);
      }
    }
  }

  const impactEdges = new Set();
  simEdges.forEach((e, i) => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (impactSet.has(sid) && impactSet.has(tid)) {
      impactEdges.add(i);
    }
  });

  nodeCircles.each(function(d) {
    const el = d3.select(this);
    el.classed('dimmed', !impactSet.has(d.id));
    el.classed('highlighted', false);
    el.classed('selected', d.id === startId);
    el.classed('impact', impactSet.has(d.id) && d.id !== startId);
  });

  nodeLabels.each(function(d) {
    const el = d3.select(this);
    el.classed('dimmed', !impactSet.has(d.id));
    el.classed('highlighted', false);
    el.classed('selected', d.id === startId);
    el.classed('impact', impactSet.has(d.id) && d.id !== startId);
  });

  edgeLines.each(function(_, i) {
    const el = d3.select(this);
    el.classed('dimmed', !impactEdges.has(i));
    el.classed('highlighted', false);
    el.classed('impact', impactEdges.has(i));
  });

  edgeLabels.each(function(_, i) {
    const el = d3.select(this);
    el.classed('dimmed', !impactEdges.has(i));
    el.classed('highlighted', false);
    el.classed('impact', impactEdges.has(i));
  });
}

// ── Detail Panel ────────────────────────────────────────────────────────────
function showDetailPanel(id) {
  const node = graphData.nodes.find(n => n.id === id);
  if (!node) return;

  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const deps = edges.filter(e => e.source === id || (typeof e.source === 'object' && e.source.id === id));
  const dependents = edges.filter(e => e.target === id || (typeof e.target === 'object' && e.target.id === id));

  let html = `
    <div class="spec-id">${node.id}</div>
    <div class="spec-title">${node.title || 'Untitled'}</div>
    <div class="detail-field">
      <div class="field-label">Layer</div>
      <div class="field-value"><span class="layer-badge" style="background:${layerColor(node.layer)}33;color:${layerColor(node.layer)}">${node.layer || 'unspecified'}</span></div>
    </div>
    <div class="detail-field">
      <div class="field-label">Type</div>
      <div class="field-value">${node.type || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">Status</div>
      <div class="field-value"><span class="status-badge ${node.status || 'draft'}">${node.status || 'draft'}</span></div>
    </div>
    <div class="detail-field">
      <div class="field-label">Confidence</div>
      <div class="field-value">${node.confidence || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">Domain</div>
      <div class="field-value">${node.domain || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">Subdomain</div>
      <div class="field-value">${node.subdomain || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">Owner</div>
      <div class="field-value">${node.owner || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">Version</div>
      <div class="field-value">${node.version || '-'}</div>
    </div>
    <div class="detail-field">
      <div class="field-label">File</div>
      <div class="field-value">${node.file ? `<a class="file-link" onclick="openSpecModal('${node.id}')">${node.file}</a>` : '-'}</div>
    </div>
  `;

  if (node.tags && node.tags.length > 0) {
    html += `
      <div class="detail-field">
        <div class="field-label">Tags</div>
        <div class="tag-list">${node.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    `;
  }

  if (deps.length > 0) {
    html += `<div class="detail-section-title">Dependencies (${deps.length})</div>`;
    for (const e of deps) {
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      html += `<div class="dep-item" data-id="${tid}"><span>${tid}</span><span class="dep-relation">${e.relation}</span></div>`;
    }
  }

  if (dependents.length > 0) {
    html += `<div class="detail-section-title">Dependents (${dependents.length})</div>`;
    for (const e of dependents) {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      html += `<div class="dep-item" data-id="${sid}"><span>${sid}</span><span class="dep-relation">${e.relation}</span></div>`;
    }
  }

  content.innerHTML = html;
  panel.classList.add('open');

  content.querySelectorAll('.dep-item').forEach(el => {
    el.addEventListener('click', () => {
      selectNode(el.dataset.id);
    });
  });

// ── Filters ─────────────────────────────────────────────────────────────────
function populateFilters() {
  const layers = [...new Set(graphData.nodes.map(n => n.layer).filter(Boolean))].sort();
  const statuses = [...new Set(graphData.nodes.map(n => n.status).filter(Boolean))].sort();
  const confidences = [...new Set(graphData.nodes.map(n => n.confidence).filter(Boolean))].sort();

  const layerSel = document.getElementById('filter-layer');
  layers.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; layerSel.appendChild(o); });

  const statusSel = document.getElementById('filter-status');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; statusSel.appendChild(o); });

  const confSel = document.getElementById('filter-confidence');
  confidences.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; confSel.appendChild(o); });
}

function applyFilters() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const activeAxisBtn = document.querySelector('.axis-toggle.active');
  const axisVal = activeAxisBtn ? activeAxisBtn.dataset.axis : '';
  const layerVal = document.getElementById('filter-layer').value;
  const statusVal = document.getElementById('filter-status').value;
  const confVal = document.getElementById('filter-confidence').value;

  const hasFilter = query || axisVal || layerVal || statusVal || confVal;

  if (!hasFilter) {
    if (!selectedNodeId && !impactMode) {
      nodeCircles.classed('dimmed highlighted', false);
      nodeLabels.classed('dimmed highlighted', false);
      edgeLines.classed('dimmed highlighted', false);
      edgeLabels.classed('dimmed highlighted', false);
    }
    return;
  }

  const matchingIds = new Set();

  graphData.nodes.forEach(n => {
    let match = true;
    if (query) {
      const q = query;
      match = match && ((n.id || '').toLowerCase().includes(q) || (n.title || '').toLowerCase().includes(q));
    }
    if (axisVal) match = match && classifyAxis(n) === axisVal;
    if (layerVal) match = match && n.layer === layerVal;
    if (statusVal) match = match && n.status === statusVal;
    if (confVal) match = match && n.confidence === confVal;
    if (match) matchingIds.add(n.id);
  });

  nodeCircles.each(function(d) {
    d3.select(this).classed('dimmed', !matchingIds.has(d.id));
    d3.select(this).classed('highlighted', matchingIds.has(d.id));
  });

  nodeLabels.each(function(d) {
    d3.select(this).classed('dimmed', !matchingIds.has(d.id));
    d3.select(this).classed('highlighted', matchingIds.has(d.id));
  });

  edgeLines.each(function(e) {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    const match = matchingIds.has(sid) && matchingIds.has(tid);
    d3.select(this).classed('dimmed', !match);
    d3.select(this).classed('highlighted', match);
  });

  edgeLabels.each(function(e) {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    const match = matchingIds.has(sid) && matchingIds.has(tid);
    d3.select(this).classed('dimmed', !match);
    d3.select(this).classed('highlighted', match);
  });
}

document.getElementById('search-input').addEventListener('input', applyFilters);
document.querySelectorAll('.axis-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const wasActive = btn.classList.contains('active');
    document.querySelectorAll('.axis-toggle').forEach(b => b.classList.remove('active'));
    if (!wasActive) btn.classList.add('active');
    applyFilters();
  });
});
document.getElementById('filter-layer').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);
document.getElementById('filter-confidence').addEventListener('change', applyFilters);

// ── Stats Panel ─────────────────────────────────────────────────────────────
function buildStats() {
  const stats = document.getElementById('stats');
  const nodes = graphData.nodes;
  const meta = graphData.metadata || {};

  const connected = new Set();
  edges.forEach(e => { connected.add(e.source); connected.add(e.target); });
  const orphanCount = nodes.filter(n => !connected.has(n.id)).length;

  const rows = [
    ['Total specs', meta.spec_count || nodes.length],
    ['Total edges', meta.edge_count || edges.length],
    ['Orphans', orphanCount],
  ];

  const byAxis = {};
  nodes.forEach(n => { const a = classifyAxis(n); byAxis[a] = (byAxis[a] || 0) + 1; });
  const axisLabels = { knowledge: 'persistent', work: 'ephemeral', governance: 'bridge' };

  const byLayer = {};
  nodes.forEach(n => { const l = n.layer || 'unspecified'; byLayer[l] = (byLayer[l] || 0) + 1; });

  let html = '<h3>Graph Stats</h3>';
  for (const [label, value] of rows) {
    html += `<div class="stat-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
  }
  html += '<div class="stat-divider"></div>';
  for (const [axis, count] of Object.entries(byAxis).sort((a, b) => b[1] - a[1])) {
    html += `<div class="stat-row"><span class="label">${axis} <span style="color:#454558;font-size:10px">${axisLabels[axis] || ''}</span></span><span class="value">${count}</span></div>`;
  }
  html += '<div class="stat-divider"></div>';
  for (const [layer, count] of Object.entries(byLayer).sort((a, b) => b[1] - a[1])) {
    html += `<div class="stat-row"><span class="label" style="color:${layerColor(layer)}">${layer}</span><span class="value">${count}</span></div>`;
  }

  stats.innerHTML = html;
}

// ── Timeline View ────────────────────────────────────────────────────────
let timelineBuilt = false;
let tlSelectedId = null;
let tlSwimlanes = [];
let tlXScale = null;
let tlBarPositions = new Map();

const PHASE_COLORS = {
  Specify: '#ff922b',
  Plan: '#339af0',
  Implement: '#51cf66',
  Consolidate: '#cc5de8',
};

function buildTimeline() {
  if (timelineBuilt) return;
  timelineBuilt = true;

  const chartContainer = document.getElementById('timeline-chart');
  const labelsContainer = document.getElementById('timeline-labels');
  const legendContainer = document.getElementById('timeline-legend');

  const workNodes = graphData.nodes.filter(n => classifyAxis(n) === 'work');

  if (workNodes.length === 0) {
    chartContainer.innerHTML = '<svg class="timeline-svg" width="400" height="200"><text class="timeline-empty" x="200" y="100">No work artifacts found</text></svg>';
    return;
  }

  // Build parent hierarchy
  const parentEdges = {};
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (e.relation === 'depends-on' || e.relation === 'implements') {
      const srcNode = graphData.nodes.find(n => n.id === sid);
      const tgtNode = graphData.nodes.find(n => n.id === tid);
      if (srcNode && tgtNode) {
        if ((srcNode.layer === 'work-task' && tgtNode.layer === 'work-plan') ||
            (srcNode.layer === 'work-plan' && tgtNode.layer === 'work-spec') ||
            (srcNode.layer === 'work-task' && tgtNode.layer === 'work-spec')) {
          parentEdges[sid] = tid;
        }
      }
    }
  });

  const wrkSpecs = workNodes.filter(n => n.layer === 'work-spec');
  const wrkPlans = workNodes.filter(n => n.layer === 'work-plan');
  const wrkTasks = workNodes.filter(n => n.layer === 'work-task');

  function findRoot(id) {
    let current = id;
    let depth = 0;
    while (parentEdges[current] && depth < 10) {
      current = parentEdges[current];
      depth++;
    }
    return current;
  }

  // Build swimlane data
  const swimlanes = [];
  for (const spec of wrkSpecs) {
    const children = workNodes.filter(n => n.id !== spec.id && findRoot(n.id) === spec.id);
    const allItems = [spec, ...children];

    const activated = [];
    edges.forEach(e => {
      const sid = typeof e.source === 'object' ? e.source.id : e.source;
      const tid = typeof e.target === 'object' ? e.target.id : e.target;
      if (e.relation === 'activates' && allItems.some(n => n.id === sid)) {
        const targetNode = graphData.nodes.find(n => n.id === tid);
        if (targetNode && !activated.some(a => a.id === targetNode.id)) activated.push(targetNode);
      }
    });

    const specTasks = wrkTasks.filter(t => findRoot(t.id) === spec.id);
    const allTasksCompleted = specTasks.length > 0 && specTasks.every(t => t.status === 'completed' || t.status === 'archived');
    let phase = 'Specify';
    if (allTasksCompleted && specTasks.length > 0) {
      phase = 'Consolidate';
    } else if (specTasks.some(t => t.status === 'active')) {
      phase = 'Implement';
    } else if (wrkPlans.some(p => findRoot(p.id) === spec.id)) {
      phase = 'Plan';
    }

    const completedTasks = specTasks.filter(t => t.status === 'completed' || t.status === 'archived').length;
    const totalTasks = specTasks.length;

    swimlanes.push({
      spec,
      plans: children.filter(n => n.layer === 'work-plan'),
      tasks: specTasks,
      activated,
      phase,
      allItems,
      completedTasks,
      totalTasks,
    });
  }

  // Orphan work items
  const assignedIds = new Set();
  swimlanes.forEach(s => s.allItems.forEach(n => assignedIds.add(n.id)));
  const orphanWork = workNodes.filter(n => !assignedIds.has(n.id));
  if (orphanWork.length > 0) {
    swimlanes.push({
      spec: { id: '(unassigned)', title: 'Unassigned Work', status: 'draft', layer: 'work-spec' },
      plans: orphanWork.filter(n => n.layer === 'work-plan'),
      tasks: orphanWork.filter(n => n.layer === 'work-task'),
      activated: [],
      phase: '\u2014',
      allItems: orphanWork,
      completedTasks: 0,
      totalTasks: 0,
    });
  }

  tlSwimlanes = swimlanes;

  // Collect task-to-task dependencies
  const taskDeps = [];
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (e.relation === 'depends-on') {
      const srcNode = graphData.nodes.find(n => n.id === sid);
      const tgtNode = graphData.nodes.find(n => n.id === tid);
      if (srcNode && tgtNode && srcNode.layer === 'work-task' && tgtNode.layer === 'work-task') {
        taskDeps.push({ from: tid, to: sid });
      }
    }
  });

  // Parse dates
  const allDates = [];
  workNodes.forEach(n => {
    if (n.created) { const d = new Date(n.created); if (!isNaN(d)) allDates.push(d); }
    if (n.updated) { const d = new Date(n.updated); if (!isNaN(d)) allDates.push(d); }
  });
  swimlanes.forEach(lane => {
    lane.activated.forEach(aSpec => {
      if (aSpec.updated) { const d = new Date(aSpec.updated); if (!isNaN(d)) allDates.push(d); }
      if (aSpec.created) { const d = new Date(aSpec.created); if (!isNaN(d)) allDates.push(d); }
    });
  });
  const hasDates = allDates.length >= 2;

  // Layout constants
  const MARGIN = { top: 50, right: 40, bottom: 30 };
  const BASE_ROW = 60;
  const TASK_SLOT = 22;
  const BAR_HEIGHT = 22;
  const TASK_HEIGHT = 16;
  const MIN_PX_PER_DAY = 18;
  const SPEC_INDENT = 0;
  const PLAN_INDENT = 12;
  const TASK_INDENT = 24;

  const rowHeights = swimlanes.map(lane => {
    const extraTasks = Math.max(0, lane.tasks.length - 1);
    return BASE_ROW + extraTasks * TASK_SLOT + 16;
  });
  const rowY = [];
  let cumulY = 0;
  for (let i = 0; i < rowHeights.length; i++) {
    rowY.push(cumulY);
    cumulY += rowHeights[i];
  }
  const totalHeight = cumulY;

  const LABEL_WIDTH = 220;
  const scrollArea = document.getElementById('timeline-scroll-area');
  const availableWidth = (scrollArea.clientWidth || window.innerWidth) - LABEL_WIDTH;
  let chartWidth;
  if (hasDates) {
    const minDate = new Date(Math.min(...allDates.map(d => d.getTime())));
    const maxDate = new Date(Math.max(...allDates.map(d => d.getTime())));
    const rangeDays = Math.max((maxDate - minDate) / 86400000, 7);
    chartWidth = Math.max(rangeDays * MIN_PX_PER_DAY, availableWidth - MARGIN.right, 600);
  } else {
    chartWidth = Math.max(availableWidth - MARGIN.right, 600);
  }
  const svgWidth = chartWidth + MARGIN.right;
  const svgHeight = MARGIN.top + totalHeight + MARGIN.bottom;

  // Build legend
  legendContainer.innerHTML = [
    { label: 'Draft', color: STATUS_COLORS.draft },
    { label: 'Active', color: STATUS_COLORS.active },
    { label: 'Completed', color: STATUS_COLORS.completed },
    { label: 'Archived', color: STATUS_COLORS.archived },
  ].map(l => `<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`).join('');

  // Build sticky labels
  labelsContainer.innerHTML = '';
  const labelSpacer = document.createElement('div');
  labelSpacer.style.height = MARGIN.top + 'px';
  labelSpacer.style.flexShrink = '0';
  labelsContainer.appendChild(labelSpacer);

  swimlanes.forEach((lane, i) => {
    const phColor = PHASE_COLORS[lane.phase] || '#888';
    const progressPct = lane.totalTasks > 0 ? Math.round((lane.completedTasks / lane.totalTasks) * 100) : 0;
    const div = document.createElement('div');
    div.className = 'tl-label-row';
    div.dataset.laneIdx = i;
    div.style.height = rowHeights[i] + 'px';
    div.style.background = i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.03)';
    div.innerHTML = `
      <div class="tl-label-id">${lane.spec.id}</div>
      <div class="tl-label-title">${lane.spec.title || ''}</div>
      <span class="tl-phase-badge" style="background:${phColor}22;color:${phColor}">${lane.phase}</span>
      ${lane.totalTasks > 0 ? `
        <div class="tl-progress">
          <div class="tl-progress-fill" style="width:${progressPct}%;background:${STATUS_COLORS.completed}"></div>
        </div>
        <div style="font-size:9px;color:#606070;font-family:var(--font-mono);margin-top:2px">${lane.completedTasks}/${lane.totalTasks} tasks</div>
      ` : ''}
    `;
    labelsContainer.appendChild(div);
  });

  // Create SVG
  const svgEl = d3.select(chartContainer).append('svg')
    .attr('class', 'timeline-svg')
    .attr('width', svgWidth)
    .attr('height', svgHeight);

  // Arrowhead marker
  svgEl.append('defs').append('marker')
    .attr('id', 'dep-arrowhead')
    .attr('viewBox', '0 0 10 7')
    .attr('refX', 10).attr('refY', 3.5)
    .attr('markerWidth', 8).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('polygon')
    .attr('points', '0 0, 10 3.5, 0 7')
    .attr('fill', 'rgba(255, 146, 43, 0.5)');

  const chart = svgEl.append('g')
    .attr('transform', `translate(0,${MARGIN.top})`);

  // Time scale
  let xScale;
  if (hasDates) {
    const minDate = new Date(Math.min(...allDates.map(d => d.getTime())));
    const maxDate = new Date(Math.max(...allDates.map(d => d.getTime())));
    const pad = Math.max((maxDate - minDate) * 0.08, 86400000 * 3);
    xScale = d3.scaleTime()
      .domain([new Date(minDate.getTime() - pad), new Date(maxDate.getTime() + pad)])
      .range([0, chartWidth]);

    const tickCount = Math.max(Math.floor(chartWidth / 90), 4);
    const xAxis = d3.axisTop(xScale).ticks(tickCount).tickFormat(d3.timeFormat('%b %d'));
    chart.append('g')
      .attr('class', 'timeline-axis')
      .call(xAxis);

    chart.append('g')
      .attr('class', 'timeline-grid')
      .selectAll('line')
      .data(xScale.ticks(tickCount))
      .join('line')
      .attr('x1', d => xScale(d))
      .attr('x2', d => xScale(d))
      .attr('y1', 0)
      .attr('y2', totalHeight)
      .style('stroke', 'rgba(255,255,255,0.04)');

    // Today marker
    const today = new Date();
    const todayX = xScale(today);
    if (todayX >= 0 && todayX <= chartWidth) {
      chart.append('line')
        .attr('class', 'today-line')
        .attr('x1', todayX).attr('x2', todayX)
        .attr('y1', -8).attr('y2', totalHeight);
      chart.append('text')
        .attr('class', 'today-label')
        .attr('x', todayX + 4).attr('y', -12)
        .text('Today');
    }
  } else {
    xScale = d3.scaleLinear().domain([0, 1]).range([0, chartWidth]);
  }
  tlXScale = xScale;

  // Draw swimlanes
  tlBarPositions.clear();

  swimlanes.forEach((lane, i) => {
    const y = rowY[i];
    const h = rowHeights[i];

    chart.append('rect')
      .attr('class', 'swimlane-bg')
      .attr('x', 0).attr('y', y)
      .attr('width', svgWidth).attr('height', h)
      .attr('fill', i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.03)');

    function getBarGeom(node) {
      let x0, barWidth;
      if (hasDates && node.created) {
        const start = new Date(node.created);
        const end = node.updated ? new Date(node.updated) : start;
        x0 = xScale(start);
        barWidth = Math.max(xScale(end) - xScale(start), 30);
      } else {
        const idx = lane.allItems.indexOf(node);
        const total = lane.allItems.length || 1;
        x0 = (idx / total) * chartWidth;
        barWidth = Math.max(chartWidth / total - 4, 30);
      }
      return { x0, barWidth };
    }

    function drawBar(node, yOffset, barH, indent) {
      const { x0, barWidth } = getBarGeom(node);
      const bx = x0 + indent;
      const by = y + yOffset;
      const color = STATUS_COLORS[node.status] || DEFAULT_COLOR;

      tlBarPositions.set(node.id, { x: bx, y: by, w: barWidth - indent, h: barH, laneIdx: i });

      chart.append('rect')
        .attr('class', 'timeline-bar')
        .attr('data-id', node.id)
        .attr('x', bx)
        .attr('y', by)
        .attr('width', Math.max(barWidth - indent, 20))
        .attr('height', barH)
        .attr('fill', color)
        .attr('opacity', node.status === 'archived' ? 0.4 : 0.8)
        .on('click', () => { showTimelineDetail(node.id); })
        .on('mouseenter', function(event) {
          chart.selectAll('.timeline-bar').each(function() {
            const el = d3.select(this);
            const barLane = tlBarPositions.get(el.attr('data-id'));
            if (barLane && barLane.laneIdx === i) {
              el.attr('stroke', 'rgba(255,255,255,0.25)').attr('stroke-width', 1);
            }
          });
          const tip = document.getElementById('tooltip');
          tip.innerHTML = `<span class="tip-id">${node.id}</span>${node.title ? `<span class="tip-title">${node.title}</span>` : ''}<span class="tip-meta">${node.status}${node.created ? ' \u00b7 ' + node.created + ' \u2192 ' + (node.updated || '') : ''}</span>`;
          tip.style.display = 'block';
          tip.style.left = event.clientX + 12 + 'px';
          tip.style.top = event.clientY - 8 + 'px';
        })
        .on('mousemove', (event) => {
          const tip = document.getElementById('tooltip');
          tip.style.left = event.clientX + 12 + 'px';
          tip.style.top = event.clientY - 8 + 'px';
        })
        .on('mouseleave', function() {
          chart.selectAll('.timeline-bar').attr('stroke', null).attr('stroke-width', null);
          if (tlSelectedId) {
            chart.select(`.timeline-bar[data-id="${tlSelectedId}"]`)
              .attr('stroke', '#ff922b').attr('stroke-width', 2.5);
          }
          document.getElementById('tooltip').style.display = 'none';
        });

      chart.append('text')
        .attr('class', 'timeline-bar-label')
        .attr('data-id', node.id)
        .attr('x', bx + 6)
        .attr('y', by + barH / 2 + 3.5)
        .text(node.id)
        .style('font-size', barH < 20 ? '8px' : '10px');
    }

    function drawConnector(fromY, toY, x) {
      chart.append('line')
        .attr('class', 'connector-line')
        .attr('x1', x + 6).attr('x2', x + 6)
        .attr('y1', fromY).attr('y2', toY);
    }

    // Spec bar
    const specGeom = getBarGeom(lane.spec);
    drawBar(lane.spec, 8, BAR_HEIGHT, SPEC_INDENT);

    // Plan bars
    lane.plans.forEach((plan, pi) => {
      const planY = 8 + BAR_HEIGHT + 4;
      drawConnector(y + 8 + BAR_HEIGHT, y + planY, specGeom.x0 + PLAN_INDENT);
      drawBar(plan, planY, TASK_HEIGHT, PLAN_INDENT);
    });

    // Task bars
    const taskStartY = 8 + BAR_HEIGHT + 4 + (lane.plans.length > 0 ? TASK_HEIGHT + 4 : 0);
    lane.tasks.forEach((task, ti) => {
      const taskY = taskStartY + ti * TASK_SLOT;
      const connX = specGeom.x0 + TASK_INDENT;
      if (lane.plans.length > 0) {
        drawConnector(y + taskStartY - 4, y + taskY, connX);
      } else {
        drawConnector(y + 8 + BAR_HEIGHT, y + taskY, connX);
      }
      drawBar(task, taskY, TASK_HEIGHT, TASK_INDENT);
    });

    // Knowledge spec activation markers
    if (hasDates && lane.activated.length > 0) {
      const seen = new Set();
      lane.activated.forEach(aSpec => {
        if (seen.has(aSpec.id)) return;
        seen.add(aSpec.id);
        const specDate = aSpec.updated ? new Date(aSpec.updated) : aSpec.created ? new Date(aSpec.created) : null;
        if (!specDate || isNaN(specDate)) return;

        const mx = xScale(specDate);
        const color = layerColor(aSpec);

        chart.append('line')
          .attr('class', 'activation-marker-line')
          .attr('x1', mx).attr('x2', mx)
          .attr('y1', y + 4).attr('y2', y + h - 4)
          .attr('stroke', color)
          .attr('stroke-width', 1)
          .attr('opacity', 0.2);

        const dy = y + h - 12;
        const size = 5;
        chart.append('path')
          .attr('class', 'activation-marker')
          .attr('d', `M${mx},${dy - size} L${mx + size},${dy} L${mx},${dy + size} L${mx - size},${dy} Z`)
          .attr('fill', color)
          .attr('opacity', 0.7)
          .on('mouseenter', (event) => {
            const dateStr = specDate.toISOString().slice(0, 10);
            const tip = document.getElementById('tooltip');
            tip.innerHTML = `<span class="tip-id">${aSpec.id}</span>${aSpec.title ? `<span class="tip-title">${aSpec.title}</span>` : ''}<span class="tip-meta">updated ${dateStr}</span>`;
            tip.style.display = 'block';
            tip.style.left = event.clientX + 12 + 'px';
            tip.style.top = event.clientY - 8 + 'px';
          })
          .on('mousemove', (event) => {
            const tip = document.getElementById('tooltip');
            tip.style.left = event.clientX + 12 + 'px';
            tip.style.top = event.clientY - 8 + 'px';
          })
          .on('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
          })
          .on('click', () => {
            selectNode(aSpec.id);
            document.querySelector('.view-tab[data-view="graph"]').click();
          });

        chart.append('text')
          .attr('class', 'activation-marker-label')
          .attr('x', mx)
          .attr('y', dy + size + 9)
          .attr('fill', color)
          .attr('opacity', 0.45)
          .text(aSpec.id);
      });
    }
  });

  // Dependency arrows
  taskDeps.forEach(dep => {
    const fromPos = tlBarPositions.get(dep.from);
    const toPos = tlBarPositions.get(dep.to);
    if (fromPos && toPos) {
      const x1 = fromPos.x + fromPos.w;
      const y1 = fromPos.y + fromPos.h / 2;
      const x2 = toPos.x;
      const y2 = toPos.y + toPos.h / 2;
      const midX = (x1 + x2) / 2;
      chart.append('path')
        .attr('class', 'dep-arrow')
        .attr('data-from', dep.from)
        .attr('data-to', dep.to)
        .attr('d', `M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}`);
    }
  });

  // Zoom on X axis
  scrollArea.addEventListener('wheel', (event) => {
    if (event.ctrlKey || event.metaKey) {
      event.preventDefault();
      const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
      const currentWidth = parseFloat(svgEl.attr('width'));
      const newWidth = Math.max(400, Math.min(currentWidth * zoomFactor, chartWidth * 5));
      svgEl.attr('width', newWidth);
      if (hasDates && tlXScale) {
        tlXScale.range([0, newWidth - MARGIN.right]);
      }
    }
  }, { passive: false });

  // Close detail on Esc
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeTimelineDetail();
    }
  });

  svgEl.on('click', function(event) {
    if (event.target === this || event.target.tagName === 'svg') {
      closeTimelineDetail();
    }
  });
}

// ── Timeline Detail Panel ──────────────────────────────────────────────────
function showTimelineDetail(id) {
  const node = graphData.nodes.find(n => n.id === id);
  if (!node) return;

  tlSelectedId = id;

  d3.selectAll('.timeline-bar').attr('stroke', null).attr('stroke-width', null);
  d3.select(`.timeline-bar[data-id="${id}"]`)
    .attr('stroke', '#ff922b').attr('stroke-width', 2.5);

  const panel = document.getElementById('timeline-detail');
  const content = document.getElementById('timeline-detail-content');

  const lane = tlSwimlanes.find(l => l.allItems.some(n => n.id === id));

  let hierarchy = [];
  if (lane) {
    hierarchy.push({ id: lane.spec.id, layer: 'work-spec' });
    if (node.layer === 'work-plan' || node.layer === 'work-task') {
      const plan = lane.plans.find(p => p.id === id) || lane.plans[0];
      if (plan) hierarchy.push({ id: plan.id, layer: 'work-plan' });
    }
    if (node.layer === 'work-task') {
      hierarchy.push({ id: node.id, layer: 'work-task' });
    }
  }

  const nodeActivated = [];
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (e.relation === 'activates' && sid === id) {
      const t = graphData.nodes.find(n => n.id === tid);
      if (t) nodeActivated.push(t);
    }
  });

  const phase = lane ? lane.phase : '\u2014';
  const phColor = PHASE_COLORS[phase] || '#888';

  let html = `
    <div class="td-header">
      <div>
        <div class="td-id">${node.id}</div>
        <div class="td-title">${node.title || 'Untitled'}</div>
      </div>
      <button class="td-close" onclick="closeTimelineDetail()">&times;</button>
    </div>
    <div class="td-badges">
      <span class="status-badge ${node.status || 'draft'}">${node.status || 'draft'}</span>
      <span class="tl-phase-badge" style="background:${phColor}22;color:${phColor}">${phase}</span>
      ${node.confidence ? `<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.06);color:var(--text-secondary);font-family:var(--font-mono)">${node.confidence}</span>` : ''}
    </div>
    <div class="td-body">
      <div class="td-section">
        <h4>Details</h4>
        <div class="td-meta-item"><span>Owner:</span> ${node.owner || '\u2014'}</div>
        <div class="td-meta-item"><span>Created:</span> ${node.created || '\u2014'}</div>
        <div class="td-meta-item"><span>Updated:</span> ${node.updated || '\u2014'}</div>
        <div class="td-meta-item"><span>Version:</span> ${node.version || '\u2014'}</div>
        <div class="td-meta-item"><span>File:</span> ${node.file ? `<a class="file-link" onclick="openSpecModal('${node.id}')">${node.file}</a>` : '\u2014'}</div>
        <button class="td-view-graph-btn" onclick="selectNode('${node.id}');document.querySelector('.view-tab[data-view=\\'graph\\']').click();">View in Graph \u2192</button>
      </div>
      <div class="td-section">
        <h4>Activates</h4>
        ${nodeActivated.length > 0
          ? nodeActivated.map(a => {
              const c = layerColor(a);
              return `<span class="td-activates-item" style="background:${c}18;color:${c};border:1px solid ${c}33" onclick="selectNode('${a.id}');document.querySelector('.view-tab[data-view=\\'graph\\']').click();">${a.id}</span>`;
            }).join('')
          : '<div class="td-meta-item" style="color:#454558">None</div>'
        }
        ${lane && lane.activated.length > nodeActivated.length ? `<div style="margin-top:6px;font-size:9px;color:#454558">${lane.activated.length} total in work stream</div>` : ''}
      </div>
      <div class="td-section">
        <h4>Hierarchy</h4>
        <div class="td-breadcrumb">
          ${hierarchy.map((h, idx) => {
            const c = layerColor(h.layer);
            const isCurrent = h.id === id;
            return `${idx > 0 ? '<span class="td-bc-arrow">\u2192</span>' : ''}<span class="td-bc-item" style="background:${c}${isCurrent ? '33' : '18'};color:${c};border:1px solid ${isCurrent ? c : c + '33'}" onclick="showTimelineDetail('${h.id}')">${h.id}</span>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;

  content.innerHTML = html;
  panel.classList.add('open');
}

// ── Spec Content Modal ──────────────────────────────────────────────────────

function openSpecModal(id) {
  const node = graphData.nodes.find(n => n.id === id);
  if (!node || !node.body) return;

  document.getElementById('scm-file-path').textContent = node.file || id;
  document.getElementById('scm-body').innerHTML = marked.parse(node.body);
  document.getElementById('spec-content-modal').classList.add('open');
}

function closeSpecModal() {
  document.getElementById('spec-content-modal').classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('spec-content-modal').classList.contains('open')) {
    closeSpecModal();
    e.stopImmediatePropagation();
  }
});

function closeTimelineDetail() {
  tlSelectedId = null;
  d3.selectAll('.timeline-bar').attr('stroke', null).attr('stroke-width', null);
  document.getElementById('timeline-detail').classList.remove('open');
}

// ── Timeline Filters ──────────────────────────────────────────────────────
function applyTimelineFilters() {
  if (!tlSwimlanes.length) return;

  const query = document.getElementById('tl-search-input').value.toLowerCase().trim();
  const statusVal = document.getElementById('tl-filter-status').value;
  const phaseVal = document.getElementById('tl-filter-phase').value;
  const hasFilter = query || statusVal || phaseVal;

  const visibleLanes = new Set();
  tlSwimlanes.forEach((lane, i) => {
    if (!hasFilter) { visibleLanes.add(i); return; }
    let match = true;
    if (query) {
      const q = query;
      const idMatch = (lane.spec.id || '').toLowerCase().includes(q);
      const titleMatch = (lane.spec.title || '').toLowerCase().includes(q);
      const itemMatch = lane.allItems.some(n =>
        (n.id || '').toLowerCase().includes(q) || (n.title || '').toLowerCase().includes(q)
      );
      match = match && (idMatch || titleMatch || itemMatch);
    }
    if (statusVal) {
      match = match && lane.allItems.some(n => n.status === statusVal);
    }
    if (phaseVal) {
      match = match && lane.phase === phaseVal;
    }
    if (match) visibleLanes.add(i);
  });

  document.querySelectorAll('.tl-label-row').forEach(row => {
    const idx = parseInt(row.dataset.laneIdx);
    row.style.display = visibleLanes.has(idx) ? '' : 'none';
  });

  d3.selectAll('.timeline-bar').each(function() {
    const el = d3.select(this);
    const id = el.attr('data-id');
    const pos = tlBarPositions.get(id);
    if (pos) {
      el.style('display', visibleLanes.has(pos.laneIdx) ? null : 'none');
    }
  });

  d3.selectAll('.timeline-bar-label').each(function() {
    const el = d3.select(this);
    const id = el.attr('data-id');
    const pos = tlBarPositions.get(id);
    if (pos) {
      el.style('display', visibleLanes.has(pos.laneIdx) ? null : 'none');
    }
  });

  d3.selectAll('.swimlane-bg').each(function(d, i) {
    d3.select(this).style('display', visibleLanes.has(i) ? null : 'none');
  });

  d3.selectAll('.dep-arrow').each(function() {
    const el = d3.select(this);
    const fromId = el.attr('data-from');
    const toId = el.attr('data-to');
    const fromPos = tlBarPositions.get(fromId);
    const toPos = tlBarPositions.get(toId);
    const visible = fromPos && toPos && visibleLanes.has(fromPos.laneIdx) && visibleLanes.has(toPos.laneIdx);
    el.style('display', visible ? null : 'none');
  });
}

document.getElementById('tl-search-input').addEventListener('input', applyTimelineFilters);
document.getElementById('tl-filter-status').addEventListener('change', applyTimelineFilters);
document.getElementById('tl-filter-phase').addEventListener('change', applyTimelineFilters);
</script>
</body>
</html>
