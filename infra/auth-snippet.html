<!-- ============================================================ -->
<!-- Auth Gate — Google Identity Services (no Firebase Auth)      -->
<!-- Restricts access to @nfq.es and @nter.es Google accounts      -->
<!-- ============================================================ -->

<!-- HEAD: GIS SDK (insert before </head>) -->
<!-- __AUTH_HEAD_START__ -->
<script src="https://accounts.google.com/gsi/client"></script>
<!-- __AUTH_HEAD_END__ -->

<!-- BODY: Auth overlay (insert after <body>) -->
<!-- __AUTH_BODY_START__ -->
<div id="auth-gate" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#100D25;color:#fff;font-family:Arial,Helvetica,sans-serif;text-align:center;padding:2rem;">
    <h2 style="font-size:1.5rem;margin-bottom:0.5rem;">KDD Documentation</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:0.95rem;margin-bottom:2rem;">Sign in with your corporate account to continue</p>
    <div id="auth-gate-btn"></div>
    <p id="auth-gate-error" style="color:#D13B5F;font-size:0.85rem;margin-top:1rem;display:none;"></p>
</div>
<!-- __AUTH_BODY_END__ -->

<!-- SCRIPT: Auth logic (insert before </body>) -->
<!-- __AUTH_SCRIPT_START__ -->
<script>
(function() {
    var CLIENT_ID = "605248850504-ho9henin8ssfmcblljocrn0ak0jua49h.apps.googleusercontent.com";
    var ALLOWED_DOMAINS = ["nfq.es", "nter.es", "nfq.mx", "nfq.com.br"];
    var SESSION_KEY = "kdd_auth";
    var LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbx42FyRhBeErzd74a286wsV6CvOOq4xZQk1PFFhIQ-aDqPNGE16cBRsKOR0Ldy9zwbz4w/exec";
    var DOC_NAME = (location.pathname.replace(/^\//, '').replace(/\.html$/, '') || 'index');

    function isAllowed(email) {
        return ALLOWED_DOMAINS.some(function(d) { return email.endsWith('@' + d); });
    }

    function grantAccess() {
        document.getElementById('auth-gate').style.display = 'none';
    }

    function showError(msg) {
        var el = document.getElementById('auth-gate-error');
        el.textContent = msg;
        el.style.display = 'block';
    }

    // Check existing session
    try {
        var session = JSON.parse(sessionStorage.getItem(SESSION_KEY));
        if (session && session.email && isAllowed(session.email) && session.exp > Date.now()) {
            grantAccess();
            return; // Already authenticated, skip GIS init
        }
    } catch(e) {}

    // Google Identity Services callback
    window.__onGoogleSignIn = function(response) {
        // Decode JWT payload (base64url)
        try {
            var payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
            if (payload.email && isAllowed(payload.email)) {
                sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                    email: payload.email,
                    name: payload.name,
                    exp: Date.now() + 8 * 60 * 60 * 1000 // 8 hours
                }));
                try {
                    fetch(LOG_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ idToken: response.credential, doc: DOC_NAME })
                    }).catch(function() {});
                } catch(e) {}
                grantAccess();
            } else {
                showError('Access denied. Only corporate accounts (@nfq.es, @nter.es, @nfq.mx, @nfq.com.br) are allowed.');
            }
        } catch(e) {
            showError('Authentication error. Please try again.');
        }
    };

    // Render Google Sign-In button (no hosted_domain to allow both domains)
    google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: window.__onGoogleSignIn,
        ux_mode: 'popup'
    });
    google.accounts.id.renderButton(
        document.getElementById('auth-gate-btn'),
        { theme: 'filled_blue', size: 'large', shape: 'pill', text: 'signin_with', width: 280 }
    );
})();
</script>
<!-- __AUTH_SCRIPT_END__ -->
